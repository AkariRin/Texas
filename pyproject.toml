[project]
name = "Texas"
version = "0.1.0"
description = "A high-performance, extensible QQ Bot framework based on NapCat / OneBot 11"
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.135.1",
    "uvicorn[standard]>=0.41.0",
    "dependency-injector>=4.46",
    "pydantic>=2.10",
    "pydantic-settings>=2.7",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "psycopg[binary]>=3.2",
    "alembic>=1.14",
    "celery[redis]>=5.4",
    "celery-redbeat>=2.2",
    "redis>=5.2",
    "prometheus_client>=0.21",
    "structlog>=24.4",
    "httpx>=0.28",
    "openai>=1.0",
    "celery-types>=0.24.0",
    "boto3>=1.35",
    "pyarrow>=18.0",
]

[dependency-groups]
dev = [
    "ruff>=0.9",
    "mypy>=1.14",
]

[tool.ruff]
target-version = "py314"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "SIM", "TCH"]

[tool.ruff.lint.per-file-ignores]
"src/core/db/migrations/versions/*.py" = ["E501", "TC003", "UP035", "UP007", "I001"]
"src/core/chat/migrations/versions/*.py" = ["E501", "TC003", "UP035", "UP007", "I001"]

[tool.mypy]
python_version = "3.14"
strict = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["celery.*", "redbeat.*"]
ignore_missing_imports = true

