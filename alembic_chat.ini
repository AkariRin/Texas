# Alembic Configuration -- Chat History Database (chat_history)
# https://alembic.sqlalchemy.org/en/latest/

[alembic]
script_location = src/core/chat/migrations

# sqlalchemy.url is injected at runtime from Settings.CHAT_DATABASE_URL
# DO NOT hardcode credentials here.
sqlalchemy.url =

prepend_sys_path = .
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = CRITICAL
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = CRITICAL
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

