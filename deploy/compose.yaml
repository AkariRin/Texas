services:
  texas:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: always
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      napcat:
        condition: service_started
  napcat:
    image: mlikiowa/napcat-docker:latest
    restart: always
    environment:
      - NAPCAT_UID=${NAPCAT_UID:-1000}
      - NAPCAT_GID=${NAPCAT_GID:-1000}
    ports:
      - 6099:6099
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - napcat-qq:/app/.config/QQ
      - napcat-config:/app/napcat/config
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: texas
      POSTGRES_USER: texas
      POSTGRES_PASSWORD: texas
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
volumes:
  pgdata:
  napcat-qq:
  napcat-config:
