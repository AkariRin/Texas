services:

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: texas
      POSTGRES_USER: texas
      POSTGRES_PASSWORD: texas
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
