apiVersion: v2
name: texas
description: Texas QQ Bot 框架 — 基于 NapCat + OneBot 11 的高性能、可扩展 QQ 机器人框架
type: application
version: 0.1.0
appVersion: "0.1.0"
maintainers:
  - name: Texas Team
keywords:
  - qq
  - bot
  - onebot
  - napcat
  - fastapi
home: https://github.com/texas
sources:
  - https://github.com/texas
dependencies:
  - name: postgresql
    version: "17.4.7"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    alias: redis-broker
    version: "19.6.4"
    repository: https://charts.bitnami.com/bitnami
    condition: redis-broker.enabled
  - name: redis
    alias: redis-cache
    version: "19.6.4"
    repository: https://charts.bitnami.com/bitnami
    condition: redis-cache.enabled

